  replicaCount: 2
  image:
    repository: vasu049/dairy-flow-frontend
    tag: v1.0.73
  port: 80
ingress:
  enabled: true
  host: milk.3.110.76.117.nip.io
  tls:
    enabled: true
    secretName: milk-app-tls
