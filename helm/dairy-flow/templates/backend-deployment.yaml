apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: milk
spec:
  replicas: 2
  strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.backend.port }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://{{ .Values.externalDatabase.host }}:{{ .Values.externalDatabase.port }}/{{ .Values.externalDatabase.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "Vasu2005"
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "com.mysql.cj.jdbc.Driver"
            - name: JWT_SECRET
              value: "{{ .Values.jwt.secret }}"
            - name: JWT_EXPIRATION
              value: "{{ .Values.jwt.expiration }}"
            - name: SPRING_DATA_REDIS_HOST
              value: "{{ .Values.redis.host }}"
            - name: SPRING_DATA_REDIS_PORT
              value: "{{ .Values.redis.port }}"
            # Mail configuration
            - name: SPRING_MAIL_HOST
              value: "{{ .Values.mail.host }}"
            - name: SPRING_MAIL_PORT
              value: "{{ .Values.mail.port }}"
            - name: SPRING_MAIL_USERNAME
              value: "{{ .Values.mail.username }}"
            - name: SPRING_MAIL_PASSWORD
              value: "{{ .Values.mail.password }}"
            - name: APP_MAIL_FROM
              value: "{{ .Values.mail.from }}"